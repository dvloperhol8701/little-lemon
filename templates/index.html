{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Little Lemon</title>
    <meta name="description" content="A brief description" />
    <meta
      name="author"
      content="Based in Chicago, Illinois, Little Lemon is a family owned Mediterranean restaurant, focused on traditional recipes served with a modern twist."
    />

    <link
      rel="shortcut icon"
      type="image/png"
      href="{% static 'img/favicon.ico' %}"
    />

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla&family=Markazi+Text:wght=500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <img src="{% static 'img/logo.png' %}" alt="Little Lemon Logo" />
    </header>
    <nav>
      <ul>
        <li><a href="{% url 'index' %}">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Menu</a></li>
        <li><a href="#">Book</a></li>
      </ul>
    </nav>

    <main>
      <section>
        <article id="hero">
          <h1 class="heading_shadow">SPECIAL OFFER</h1>
          <p>30% Off This Weekend</p>
          <a href="#" class="cta">Book now</a>
        </article>
      </section>

      <section>
        {% for item in menu %}
        <article>
          <h2>{{ item.title }}</h2>
          <p>Price: ${{ item.price }}</p>
          <p>{{ item.description }}</p>
        </article>
        {% endfor %}
      </section>
    </main>

    <footer>
      <article>
        <img src="{% static 'img/logo_footer.png' %}" alt="Footer Logo" />
      </article>
      <article>
        <p>Copyright {{ current_year }} Little Lemon</p>
      </article>
    </footer>
  </body>
</html>
